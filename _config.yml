title: "Skill Patterns"
description: "A catalog of reusable patterns for composing AI Skills."
url: "https://skillpatterns.com"
baseurl: ""
repo_url: "https://github.com/borkweb/skill-patterns"

collections:
  patterns:
    output: true
    permalink: /patterns/:path/

defaults:
  - scope:
      path: ""
      type: patterns
    values:
      layout: pattern

markdown: kramdown

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - docs/
  - .superpowers/
  - vendor/
  - skill/
  - "*.pdf"
