title: "Skill Patterns"
description: "A catalog of reusable patterns for composing AI Skills."
url: "https://skillpatterns.ai"
baseurl: ""
repo_url: "https://github.com/borkweb/skill-patterns"
google_analytics: "G-X6BTVP0R5T"

collections:
  patterns:
    output: true
    permalink: /patterns/:path/

defaults:
  - scope:
      path: ""
      type: patterns
    values:
      layout: pattern

markdown: kramdown

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - DESIGN.md
  - LICENSE
  - docs/
  - .superpowers/
  - vendor/
  - skills/
  - AGENTS.md
  - CLAUDE.md
  - "*.pdf"
