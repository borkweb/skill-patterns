<aside class="sidebar" id="sidebar">
  <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-expanded="false" aria-controls="sidebar-nav">
    <span>Browse patterns</span>
    <span class="sidebar-toggle__icon" aria-hidden="true"></span>
  </button>
  <nav class="sidebar-nav" id="sidebar-nav" aria-label="Patterns">
    {% assign cats = site.data.categories | sort: "order" %}
    {% for cat in cats %}
      <div class="sidebar-cat" data-cat="{{ cat.key }}">
        <h2 class="sidebar-cat__title">{{ cat.title | escape }}</h2>
        <ul>
          {% assign pats = site.patterns | where: "category", cat.key | sort_natural: "title" %}
          {% for p in pats %}
            <li><a href="{{ p.url | relative_url }}" data-link="{{ p.slug }}"{% if p.slug == page.slug %} class="is-active" aria-current="page"{% endif %}>{% if p.icon %}<i class="{{ p.icon }}" aria-hidden="true"></i>{% endif %}{{ p.title }}</a></li>
          {% endfor %}
        </ul>
      </div>
    {% endfor %}
  </nav>
</aside>
