{% assign p = include.pattern %}
{% capture searchtext %}{{ p.title }} {{ p.summary }} {{ p.adds | join: ' ' }} {{ p.prompt }}{% endcapture %}
<a class="pcard" href="{{ p.url | relative_url }}" data-search="{{ searchtext | strip_newlines | downcase | escape }}">
  {% if p.icon %}<div class="pcard__icon"><i class="{{ p.icon }}" aria-hidden="true"></i></div>{% endif %}
  <h3 class="pcard__title">{{ p.title }}</h3>
  <p class="pcard__summary">{{ p.summary }}</p>
</a>
